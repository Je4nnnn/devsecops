name: sonarqube

services:
  db-sonar:
    image: postgres:15
    container_name: db-sonar
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonarqube
    volumes:
      - postgres_sonar_data:/var/lib/postgresql/data
    networks:
      - sonar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 10

  sonarqube:
    image: sonarqube:9.9-community
    container_name: sonarqube
    depends_on:
      db-sonar:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db-sonar:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_WEB_JAVAOPTS: -Xms256m -Xmx512m
      SONAR_CE_JAVAOPTS: -Xms256m -Xmx512m
      SONAR_SEARCH_JAVAOPTS: -Xms256m -Xmx256m
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - sonar-network

volumes:
  postgres_sonar_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  sonar-network:
    driver: bridge
